# ================== Hyprland - TheGirlPuma Clean Edition ==================

monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=DP-1,2560x1440@144,1920x0,1

# HyDE-Shit deaktivieren
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    screen_shader = ""
}

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
    }
}

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, Q, killactive
bind = SUPER, M, togglefloating
bind = SUPER, N, movetoworkspacesilent special:minimized
bind = SUPER+Shift, N, togglespecialworkspace minimized

bind = SUPER, D, exec, wofi --show drun --normal-window
bind = SUPER, Return, exec, kitty
bind = SUPER+Shift, E, exit

input {
    kb_layout = de
    follow_mouse = 1
}

exec-once = waybar
exec-once = dunst
exec-once = hyprpaper


# ================== SCREENSHOT (Snipping Tool) ==================
>>>>>>> 2fea4dc (Screenshot-Funktion (Print-Taste) hinzugefügt)
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "Screenshot" "In die Zwischenablage kopiert 📋"

# === NERVIGE WARNUNGEN UNTERDRÜCKEN ===
debug {
    suppress_errors = true
}

# === LILA/PINK VIBES ===
general {
    col.active_border = rgba(c67bffee)   # Lila-pink aktiv
    col.inactive_border = rgba(595959aa)
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 0.92
    rounding = 12
    border_size = 3
}

# === LILA/PINK RÄNDER ===
general {
    col.active_border = rgba(c67bffee)   # Schönes Lila-Pink
    col.inactive_border = rgba(5c2d8caa)
}

decoration {
    rounding = 12
    border_size = 3
    active_opacity = 1.0
    inactive_opacity = 0.94
}
