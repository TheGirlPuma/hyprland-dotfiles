# =============================================
# Hyprland - Deine Personal Edition v2.5 (Lila-Pink Max)
# =============================================

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin

# --- Monitors ---
# HDMI-A-1 = Nebenmonitor links | DP-1 = Hauptmonitor rechts
monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=DP-1,2560x1440@144,1920x0,1

# Globale virtuelle Desktops — jede Nummer ist einzigartig (1, 2, 3, …)
workspace = 1, default:true, persistent:true
workspace = 2, persistent:true

# Shortcuts-Haftnotiz: schwebend, oben rechts, bleibt bis du schließt
windowrule {
    name = shortcuts-sticky
    float = on
    size = 440 580
    pin = on
    match:class = shortcuts-sticky
}

# --- Autostart ---
exec-once = dunst
exec-once = hypridle
exec-once = hyprlock --daemon
exec-once = hyprpolkitagent
exec-once = hyprpaper -c ~/.config/hypr/hyprpaper.conf
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = blueman-applet
exec-once = ckb-next

# Waybar starten (auch beim ersten Config-Load — kein exec-once, sonst doppelt)
exec = ~/.config/hypr/scripts/start-waybar.sh

# --- General + Starke Lila-Pink Borders ---
general {
    gaps_in = 8
    gaps_out = 12
    border_size = 3
    col.active_border = rgba(cba6f7ff) rgba(f5c2e7ff) 45deg
    col.inactive_border = rgba(45475aff)
    resize_on_border = true
    layout = dwindle
}


# --- Decoration ---
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 12
        passes = 3
    }

    shadow {
        enabled = true
        range = 15
        color = rgba(00000099)
    }

    active_opacity = 1.0
    inactive_opacity = 0.94
}

# --- Animations (wichtig für animierte Borders) ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 12, default
    animation = borderangle, 1, 8, myBezier
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slide
}

# --- Input ---
input {
    kb_layout = de
    kb_variant = nodeadkeys
    kb_options = caps:escape
    accel_profile = flat
    sensitivity = 1.0
    follow_mouse = 1
}

# --- Misc ---
misc {
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# --- Keybinds ---
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, M, exit
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/spotlight-dark.rasi
bind = $mainMod, H, exec, ~/.config/hypr/scripts/shortcuts-help.sh
bind = $mainMod, Return, exec, $terminal

# --- Virtuelle Desktops (wie Windows) ---
# Desktop per Zahl aufrufen
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Fenster auf Desktop verschieben
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Strg+Super+D  = neuer Desktop | Strg+Super+F4 = Desktop schließen
bind = $mainMod CTRL, D, workspace, empty
bind = $mainMod CTRL, F4, exec, ~/.config/hypr/scripts/close-workspace.sh

# Strg+Super+Pfeil = Desktop auf aktuellem Monitor wechseln
bind = $mainMod CTRL, right, workspace, m+1
bind = $mainMod CTRL, left, workspace, m-1

# Super+Pfeil = ebenfalls Desktop wechseln (einfacher)
bind = $mainMod, right, workspace, m+1
bind = $mainMod, left,  workspace, m-1

# Aktuellen Desktop auf anderen Monitor verschieben
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/toggle-workspace-monitor.sh
bind = $mainMod SHIFT ALT, left, movecurrentworkspacetomonitor, HDMI-A-1
bind = $mainMod SHIFT ALT, right, movecurrentworkspacetomonitor, DP-1

# Fenster minimieren (Special Workspace)
bind = $mainMod, comma, togglespecialworkspace, minimized
bind = $mainMod SHIFT, comma, movetoworkspacesilent, special:minimized

# Screenshots
bind = $mainMod, S, exec, hyprshot -m region --clipboard-only
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "Screenshot" "In die Zwischenablage kopiert 📋"
# Maus-Bindings für Fenster verschieben & skalieren
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# === Wallpaper ===
preload = ~/Pictures/Wallpapers/cyberpunk-purple-nebula.jpg

wallpaper = HDMI-A-1,~/Pictures/Wallpapers/cyberpunk-purple-nebula.jpg
wallpaper = DP-1,~/Pictures/Wallpapers/cyberpunk-purple-nebula.jpg
