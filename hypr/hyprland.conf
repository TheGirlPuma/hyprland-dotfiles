# ================== Hyprland - TheGirlPuma Edition 💜 ==================

# === MONITORE ===
monitor=HDMI-A-1,1920x1080@60,0x0,1      # Dell links
monitor=DP-1,2560x1440@144,1920x0,1      # MSI rechts

# === SAUBERE EINSTELLUNGEN ===
misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = true
}

# === LILA-PINK ANIMIERTE RÄNDER ===
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 4
    col.active_border = rgba(c792faff) rgba(ff79c6ff) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 2
    }
    drop_shadow = true
    shadow_range = 15
}

# === ANIMATIONEN ===
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = border, 1, 3, myBezier
    animation = windows, 1, 4, myBezier, popin 80%
    animation = fade, 1, 4, myBezier
}

# === MAUS & FENSTER ===
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, Q, killactive
bind = SUPER, M, togglefloating
bind = SUPER, N, movetoworkspacesilent special:minimized
bind = SUPER+Shift, N, togglespecialworkspace minimized

# Menü
bind = SUPER, D, exec, wofi --show drun --normal-window
bind = SUPER, Return, exec, kitty

# Notausgang
bind = SUPER+Shift, E, exit

input {
    kb_layout = de
    follow_mouse = 1
}

exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
