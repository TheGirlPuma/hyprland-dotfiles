# =============================================
# Hyprland - Deine Personal Edition v2.5 (Lila-Pink Max)
# =============================================

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin

# --- Monitors ---
monitor=HDMI-A-1,1920x1080@60,0x0,1
monitor=DP-1,2560x1440@144,1920x0,1

# --- Autostart ---
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = hyprlock --daemon
exec-once = hyprpolkitagent
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = blueman-applet

# --- General + Starke Lila-Pink Borders ---
general {
    gaps_in = 8
    gaps_out = 12
    border_size = 5
    col.active_border = rgba(cba6f7ff) rgba(f5c2e7ff) 45deg
    col.inactive_border = rgba(45475aff)
    resize_on_border = true
    layout = dwindle
}

# --- Decoration ---
decoration {
    rounding = 12
    border_size = 5

    blur {
        enabled = true
        size = 12
        passes = 3
    }

    shadow {
        enabled = true
        range = 15
        color = rgba(00000099)
    }

    active_opacity = 1.0
    inactive_opacity = 0.94
}

# --- Animations (wichtig für animierte Borders) ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 12, default
    animation = borderangle, 1, 8, myBezier
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slide
}

# --- Input ---
input {
    kb_layout = de
    kb_variant = nodeadkeys
    kb_options = caps:escape
    accel_profile = flat
    sensitivity = 1.0
    follow_mouse = 1
}

# --- Misc ---
misc {
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# --- Keybinds ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, C, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, M, exit
bind = $mainMod, D, exec, rofi -show drun -theme ~/.config/rofi/spotlight-dark.rasi
bind = $mainMod, Return, exec, $terminal

# Workspaces (bitte bis 9 ergänzen)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
# ... bis 9

bind = $mainMod, right, workspace, +1
bind = $mainMod, left,  workspace, -1

# Screenshots
bind = $mainMod, S, exec, hyprshot -m region --clipboard-only
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy && notify-send "Screenshot" "In die Zwischenablage kopiert 📋"
